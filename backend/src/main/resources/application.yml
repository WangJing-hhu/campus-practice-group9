server:
  port: 8081

spring:
  datasource:
    # ???? 3306???? 3306 ?????? 3307
    url: jdbc:mysql://localhost:${DB_PORT:3306}/campus_qa?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT ???????????????????
jwt:
  secret: ${JWT_SECRET:change-me-in-production-32chars!!}
  expiration: 86400000  # 24 ??????

# ??
logging:
  level:
    com.group9.campusqa: debug
