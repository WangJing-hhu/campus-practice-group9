server:
  port: 8081

spring:
  datasource:
    # 端口默认 3306；如本机 3306 被占用可改为 3307
    url: jdbc:mysql://localhost:3307/campus_qa?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置（密钥通过环境变量注入，不硬编码）
jwt:
  secret: ${JWT_SECRET:change-me-in-production}
  expiration: 86400000  # 24 小时（毫秒）

# 日志
logging:
  level:
    com.group9.campusqa: debug
