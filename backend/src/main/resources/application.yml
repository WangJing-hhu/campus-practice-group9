server:
  port: 8081

spring:
  datasource:
    # 端口可通过 DB_PORT 环境变量覆盖（默认 3306，部分机器可能使用 3307）
    url: jdbc:mysql://localhost:${DB_PORT:3306}/campus_qa?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # ================================================================
  # Day4 新增: 文件上传大小限制（50MB）
  # 必须与前端 beforeUpload 校验保持一致
  # ================================================================
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置（昨日成果，不变更）
jwt:
  secret: ${JWT_SECRET:change-me-in-production-32chars!!}
  expiration: 86400000  # 24 小时（毫秒）

# ================================================================
# Day4 新增: 知识库模块自定义配置
# 敏感值（callback-token、API Key）仅通过环境变量注入
# ================================================================
campus-qa:
  # 文件上传目录（相对于项目根目录，也可设为绝对路径）
  upload:
    dir: ${UPLOAD_DIR:storage/uploads}

  # Python AI 服务内部调用配置
  ai:
    base-url: ${AI_BASE_URL:http://localhost:8000}
    connect-timeout: 5      # 连接超时（秒）
    response-timeout: 120   # 响应超时（秒）——大文件处理可能较慢
    callback-token: ${AI_CALLBACK_TOKEN:day4-internal-callback-token}

  # ================================================================
  # Day5 新增: LLM 与 Prompt 配置
  # 敏感值（api-key）仅通过环境变量注入，禁止硬编码或提交 Git
  # ================================================================
  llm:
    # DashScope OpenAI 兼容接口地址
    base-url: ${LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    # DashScope API Key（必填，通过环境变量 DASHSCOPE_API_KEY 注入）
    api-key: ${DASHSCOPE_API_KEY:}
    # 模型名称
    model: ${LLM_MODEL:qwen-plus}
    # 温度（0.0-2.0），越低越确定
    temperature: ${LLM_TEMPERATURE:0.30}
    # 最大输出 token 数
    max-tokens: ${LLM_MAX_TOKENS:1024}
    # 连接超时（秒）
    connect-timeout: 10
    # 响应超时（秒）
    response-timeout: ${LLM_RESPONSE_TIMEOUT:60}

  prompt:
    # 系统角色提示词
    system: "你是河海大学校园问答助手，只能根据提供的参考资料回答。请严格依据参考资料中的信息作答，不得补充任何未在资料中出现的事实、数据或推测。"
    # 无资料时的指令
    no-sources-instruction: "当前没有可用的参考资料，请直接回复\"根据现有资料，暂未找到相关信息\"，不要做任何额外解释。"

# 日志
logging:
  level:
    com.group9.campusqa: debug
